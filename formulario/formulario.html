<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Formulário de cadastro</h2>
    <form>
        <label for="name">Nome completo</label><br>
        <input type="text" id="name"><br><br>
        
        <label for="age">Idade</label><br>
        <input type="number" id="age"><br><br>
        
        <label for="email">E-mail</label><br>
        <input type="email" id="email"><br><br>
        
        <label for="birthdate">Data de nascimento</label><br>
        <input type="date" id="birthdate"><br><br>
        
        <label for="password">Senha</label><br>
        <input type="password" id="password"><br><br>
        
        <label for="telefone">Número de telefone</label><br>
        <input type="tel" id="telefone"><br><br>
        
        <label for="city">Cidade</label><br>
        <input type="text" id="city"><br><br>
        
        <label for="genre">Gênero</label><br>
        <input type="radio">Masculino
        <input type="radio">Feminino
        <input type="radio">Não definido <br> <br>

        <label for="Interesses">*Interesses</label> <br>
        <input type="checkbox" >T.I <br>
        <input type="checkbox" >Gastronomia <br>
        <input type="checkbox" >Gastronomia <br>
        <input type="checkbox" >Jogos <br>
        <input type="checkbox" >Esportes <br>
        <input type="checkbox" >Música <br>

        <textarea rows="15" cols="15" ></textarea> <br>
        <input type="reset" name="Limpar" id="reset"> <br>
        <input type="submit" name="Enviar" id="button"><br>
        
        
    </form>
    
</body>
</html>
