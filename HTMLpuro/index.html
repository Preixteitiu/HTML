<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Formulario cadastro</h2>
    <form >
        <label for="nome">Nome</label><br>
        <input type="text" id="nome"><br>
        
        <label for="idade">Idade</label><br>
        <input type="number" id="idade"><br>
        
        <label for="email">E-mail</label><br>
        <input type="email" id="email"><br>
        
        <label for="data">Data de Nascimento</label><br>
        <input type="date" id="data"><br>
       
        <label for="senha">Digite sua senha</label><br>
        <input type="password" id="senha"><br>
        
        <label for="genero">Gênero</label><br>
        <input type="radio">Masculino<br>
        <input type="radio">Feminino<br>
        
        <label>Interesses</label><br>
        <input type="checkbox">T.I<br>
        <input type="checkbox">Gastronomia<br>



        <label>Deixe sua mensagem</label><br>
        <textarea rows="15" id=""></textarea><br><br>

        <button type="submit" >Enviar</button>
    </form>
</body>
</html>
